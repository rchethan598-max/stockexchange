<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexchange - Contact</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/responsive.css">
    <style>
        .form-group {
            margin-bottom: 1.25rem;
        }
        .form-group label {
            display: block;
            font-size: 0.85rem;
            color: var(--color-text-muted);
            margin-bottom: 0.5rem;
        }
        .form-control {
            width: 100%;
            background-color: rgba(255,255,255,0.03);
            border: 1px solid var(--color-border);
            border-radius: 0.375rem;
            padding: 0.75rem;
            color: #fff;
            font-family: var(--font-primary);
            font-size: 0.9rem;
        }
        .form-control:focus {
            outline: none;
            border-color: var(--color-primary);
        }
    </style>
</head>
<body>

    <header>
        <div class="container nav-container">
            <div class="logo-group">
                <div class="logo-icon">N</div>
                <div class="logo-text">
                    <h1>NEXCHANGE</h1>
                    <span>STOCK EXCHANGE</span>
                </div>
            </div>
            <nav class="nav-links">
                <a href="index.html">Home</a>
                <a href="markets.html">Markets</a>
                <a href="stocks.html">Stocks</a>
                <a href="news.html">News</a>
                <a href="portfolio.html">Portfolio</a>
                <a href="watchlist.html">Watchlist</a>
                <a href="ipo.html">IPO</a>
                <a href="about.html">About Us</a>
                <a href="contact.html" class="active">Contact</a>
            </nav>
            <div class="nav-actions">
                <button class="icon-btn" aria-label="Search">🔍</button>
                <button class="icon-btn" aria-label="Notifications">🔔</button>
                <button class="icon-btn" aria-label="Profile">👤</button>
            </div>
        </div>
    </header>

    <main class="container" style="padding-top: 2rem;">
        <section class="hero-section" style="padding: 0 0 1.5rem 0;">
            <div class="market-intro">
                <h2>Support Desk</h2>
                <p>Submit documentation inquiries or get assistance regarding your trading account portal.</p>
            </div>
        </section>

        <section class="main-dashboard-grid" style="grid-template-columns: 1fr;">
            <div class="card">
                <div class="card-header">
                    <h3>Inquiry Form</h3>
                </div>
                <form action="#" method="POST" onsubmit="return false;">
                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" class="form-control" placeholder="Enter your identity name" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Corporate Email Address</label>
                        <input type="email" id="email" class="form-control" placeholder="name@domain.com" required>
                    </div>
                    <div class="form-group">
                        <label for="message">Message Description</label>
                        <textarea id="message" rows="5" class="form-control" placeholder="Specify your support context detailing account information..." required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.75rem;">Send Message</button>
                </form>
            </div>
        </section>
    </main>

    <nav class="mobile-nav">
        <a href="index.html" class="mobile-nav-item">
            <span class="mobile-nav-icon">🏠</span>
            <span>Home</span>
        </a>
        <a href="markets.html" class="mobile-nav-item">
            <span class="mobile-nav-icon">📊</span>
            <span>Markets</span>
        </a>
        <a href="watchlist.html" class="mobile-nav-item">
            <span class="mobile-nav-icon">⭐</span>
            <span>Watchlist</span>
        </a>
        <a href="portfolio.html" class="mobile-nav-item">
            <span class="mobile-nav-icon">💼</span>
            <span>Portfolio</span>
        </a>
    </nav>
</body>
</html>
